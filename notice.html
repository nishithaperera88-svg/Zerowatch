<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Notice Board</title>
    <style>
        body {
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .notice-board {
            background-color: red;
            color: white;
            padding: 30px 50px;
            border: 5px solid white;
            border-radius: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            width: 80%;
            max-width: 600px;
        }

        /* Optional: blinking effect */
        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0.6; }
        }

        .notice-board {
            animation: blink 1.5s infinite;
        }
    </style>
</head>
<body>

    <div class="notice-board">
        මෙම සේවාව තාක්ෂණික දෝෂයක හේතුවෙන් මේය යාවත්කාලීන කිරීමේදී පොවති මහත්කෙනි උත්සාහ කරන්න.
    </div>

</body>
</html>
